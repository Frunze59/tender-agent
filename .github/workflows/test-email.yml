# Send a single test message (same SMTP secrets as the daily job).
# Actions → Test SMTP email → Run workflow
# Recipient: repo secret EMAIL_TO, or the optional "recipient" field when you run the workflow.

name: Test SMTP email

on:
  workflow_dispatch:
    inputs:
      recipient:
        description: "Optional — to address if EMAIL_TO secret is empty (e.g. info@guzun.ee)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_TO_OVERRIDE: ${{ github.event.inputs.recipient }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -r requirements.txt

      - name: Send test email
        run: |
          python -c "
          from tender_agent.models import TenderItem
          from tender_agent.notify import send_tender_email
          import os
          to = (os.environ.get('EMAIL_TO_OVERRIDE', '').strip()
                or os.environ.get('EMAIL_TO', '').strip())
          if not to:
              raise SystemExit(
                  'No recipient. Either: (1) add Actions secret EMAIL_TO in repo Settings, '
                  'or (2) run this workflow again and fill the \"recipient\" input.'
              )
          send_tender_email(
              [TenderItem('test', 'Tender agent (test)', 'If you see this, SMTP from GitHub Actions works.', 'https://github.com/${{ github.repository }}', '', None)],
              subject_prefix='[Tender agent TEST]',
              recipients=[to],
          )
          print('Sent test email to', to)
          "
