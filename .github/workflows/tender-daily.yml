# Tender agent on a schedule (GitHub-hosted runner).
#
# Secrets → Settings → Secrets and variables → Actions → New repository secret
#   Required: SMTP_HOST, SMTP_USER, SMTP_PASSWORD, SMTP_FROM, EMAIL_TO
#   Optional: SMTP_PORT (empty = 587), SMTP_USE_TLS (empty = true)
#   Optional: DEEPL_AUTH_KEY, DEEPL_API_KEY, DEEPL_API_URL (if translation enabled in config)
#
# Target: once daily at 17:00 Europe/Tallinn (handles EET/EEST). GitHub cron is UTC-only, so we
# trigger at 14:00 and 15:00 UTC and run the agent only when the clock hour in Tallinn is 17
# (exactly one of the two fires per calendar day in normal conditions).
#
# Manual test: Actions → "Tender agent daily" → Run workflow (always runs; gate skipped).

name: Tender agent daily

on:
  schedule:
    - cron: "0 14 * * *" # 17:00 Tallinn in summer (EEST, UTC+3)
    - cron: "0 15 * * *" # 17:00 Tallinn in winter (EET, UTC+2)
  workflow_dispatch:

concurrency:
  group: tender-agent-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      DEEPL_AUTH_KEY: ${{ secrets.DEEPL_AUTH_KEY }}
      DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      DEEPL_API_URL: ${{ secrets.DEEPL_API_URL }}

    steps:
      - name: Gate 17:00 Europe/Tallinn (scheduled runs only)
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          H=$(TZ=Europe/Tallinn date +%H)
          echo "tallinn_hour=$H" >> "$GITHUB_OUTPUT"
          if [ "$H" = "17" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.proceed == 'true'

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.proceed == 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        if: steps.gate.outputs.proceed == 'true'
        run: pip install -r requirements.txt

      - name: Cache dedupe database
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/cache@v4
        with:
          path: data/seen.db
          key: tender-seen-db-v1-${{ github.repository_id }}

      - name: Run tender agent
        if: steps.gate.outputs.proceed == 'true'
        run: python -m tender_agent run --config config.github.yaml --db data/seen.db
